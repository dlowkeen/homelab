apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: opennotebook-ingress
  namespace: opennotebook
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # HTTP Basic Auth – secret must have key "auth" (htpasswd output)
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: opennotebook-basic-auth
    nginx.ingress.kubernetes.io/auth-realm: "OpenNotebook"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # WebSocket support for SurrealDB if needed from client
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$remote_addr"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - notebook.donovanlowkeen.com
      secretName: opennotebook-tls
  rules:
    - host: notebook.donovanlowkeen.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: opennotebook
                port:
                  number: 5055
          - path: /
            pathType: Prefix
            backend:
              service:
                name: opennotebook
                port:
                  number: 8502
