apiVersion: apps/v1
kind: Deployment
metadata:
  name: surrealdb
  namespace: opennotebook
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: surrealdb
  template:
    metadata:
      labels:
        app: surrealdb
    spec:
      containers:
      - name: surrealdb
        image: surrealdb/surrealdb:v2
        args:
          - start
          - --log
          - info
          - --user
          - $(SURREAL_USER)
          - --pass
          - $(SURREAL_PASSWORD)
          - file:/data/mydata.db
        env:
        - name: SURREAL_USER
          valueFrom:
            secretKeyRef:
              name: opennotebook-secret
              key: SURREAL_USER
        - name: SURREAL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: opennotebook-secret
              key: SURREAL_PASSWORD
        ports:
        - containerPort: 8000
          name: http
        volumeMounts:
        - name: surrealdb-data
          mountPath: /data
        resources:
          requests:
            memory: 128Mi
            cpu: 100m
          limits:
            memory: 512Mi
            cpu: 500m
      volumes:
      - name: surrealdb-data
        persistentVolumeClaim:
          claimName: surrealdb-data
