apiVersion: apps/v1
kind: Deployment
metadata:
  name: opennotebook
  namespace: opennotebook
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: opennotebook
  template:
    metadata:
      labels:
        app: opennotebook
    spec:
      containers:
      - name: opennotebook
        image: lfnovo/open_notebook:v1-latest
        ports:
        - containerPort: 8502
          name: web
        - containerPort: 5055
          name: api
        env:
        - name: SURREAL_URL
          value: "ws://surrealdb:8000/rpc"
        - name: SURREAL_USER
          valueFrom:
            secretKeyRef:
              name: opennotebook-secret
              key: SURREAL_USER
        - name: SURREAL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: opennotebook-secret
              key: SURREAL_PASSWORD
        - name: SURREAL_NAMESPACE
          value: "open_notebook"
        - name: SURREAL_DATABASE
          value: "production"
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: opennotebook-secret
              key: OPENAI_API_KEY
        - name: API_URL
          value: "https://notebook.donovanlowkeen.com"
        envFrom:
        - secretRef:
            name: opennotebook-secret
            optional: true
        volumeMounts:
        - name: opennotebook-data
          mountPath: /app/data
        resources:
          requests:
            memory: 512Mi
            cpu: 250m
          limits:
            memory: 2Gi
            cpu: 2000m
      volumes:
      - name: opennotebook-data
        persistentVolumeClaim:
          claimName: opennotebook-data
