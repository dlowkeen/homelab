[defaults]
inventory = inventory/hosts.yml
roles_path = roles
host_key_checking = False
stdout_callback = yaml
# SSH user for all hosts (change if your nodes use a different user)
remote_user = donovan

[privilege_escalation]
# Default false so ad-hoc commands (e.g. ansible all -m ping) don't ask for sudo
become = False
become_method = sudo
