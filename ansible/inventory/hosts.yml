# Homelab Kubernetes nodes. Replace placeholder hostnames/IPs with your real values.
# Ensure Ansible can SSH (key-based) to each host.
#
# GPU nodes (e.g. Dell XPS 8930) are still K8s nodes: list them in BOTH workers
# and gpu_nodes so they get both k8s_node and gpu roles.

all:
  children:
    control_plane:
      hosts:
        control-plane:
          ansible_host: 192.168.1.246
    workers:
      hosts:
        worker-1:
          ansible_host: 192.168.1.116
        gpu-node:
          # Dell XPS 8930: in workers AND gpu_nodes so it gets k8s_node + gpu
          ansible_host: 192.168.1.34
    k8s_nodes:
      children:
        control_plane: {}
        workers: {}
    gpu_nodes:
      hosts:
        gpu-node: {}
