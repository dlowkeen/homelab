---
# From docs/learnings/2026-01-24-nvidia-gpu-setup.md
nvidia_driver_version: "535"
# nerdctl version (e.g. 1.3.1); set to empty to skip installing nerdctl
nerdctl_version: "1.3.1"
# Switch GPU node to headless (multi-user.target, disable gdm3); set true for dedicated GPU nodes
gpu_headless: false
