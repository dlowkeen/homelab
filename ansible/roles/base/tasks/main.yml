---
# Base role: common Ubuntu setup for every node (from docs/learnings/2026-01-26).
# - Disable swap (required for kubelet)
# - Ensure SSH server installed and enabled
# - Common packages used by later roles

- name: Base packages and apt cleanup
  ansible.builtin.import_tasks: packages.yml
  tags:
    - base
    - packages

- name: SSH baseline
  ansible.builtin.import_tasks: ssh.yml
  tags:
    - base
    - ssh

- name: Swap baseline
  ansible.builtin.import_tasks: swap.yml
  tags:
    - base
    - swap

- name: Optional network stack management
  ansible.builtin.import_tasks: network_stack.yml
  tags:
    - base
    - network

- name: Optional firewall stack management
  ansible.builtin.import_tasks: firewall_stack.yml
  tags:
    - base
    - firewall
